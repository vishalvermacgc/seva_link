<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify & Register - SevaLink AI</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .tabs { display: flex; border-bottom: 1px solid var(--border-color); margin-bottom: 1.5rem; }
    .tab { padding: 1rem; cursor: pointer; flex: 1; text-align: center; font-weight: 600; color: var(--text-secondary); transition: var(--transition); border-bottom: 2px solid transparent; }
    .tab.active { color: var(--primary-blue); border-bottom-color: var(--primary-blue); }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
  </style>
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, rgba(66, 133, 244, 0.05) 0%, rgba(52, 168, 83, 0.05) 100%);">

  <div class="card animate-slide-up" style="max-width: 500px; width: 100%; padding: 2rem;">
    <div style="text-align: center; margin-bottom: 1.5rem;">
      <h2>Account Verification</h2>
      <p class="text-secondary mt-2">Join the SevaLink AI network</p>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('ngo')">🏢 NGO</div>
      <div class="tab" onclick="switchTab('volunteer')">🤝 Volunteer</div>
    </div>

    <!-- NGO Verification Form -->
    <div id="ngo-form" class="tab-content active">
      <div class="form-group">
        <label class="form-label">NGO Name</label>
        <input type="text" id="ngo-name" class="form-control" placeholder="e.g. HealthFirst India" required>
      </div>
      <div class="form-group">
        <label class="form-label">Registration Number</label>
        <input type="text" id="ngo-reg" class="form-control" placeholder="Govt. Registration ID" required>
      </div>
      <div class="form-group">
        <label class="form-label">Contact Email</label>
        <input type="email" id="ngo-email" class="form-control" placeholder="contact@ngo.org" required>
      </div>
      <button class="btn btn-primary w-full" style="width: 100%" onclick="submitNGORegistration()">Verify & Register NGO</button>
    </div>

    <!-- Volunteer Verification Form -->
    <div id="volunteer-form" class="tab-content">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="vol-name" class="form-control" placeholder="Your Name" required>
      </div>
      <div class="form-group">
        <label class="form-label">Contact Email</label>
        <input type="email" id="vol-email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Your Core Skills (Comma separated)</label>
        <input type="text" id="vol-skills" class="form-control" placeholder="Medical, Teaching, Logistics..." required>
      </div>
      <button class="btn btn-success w-full" style="width: 100%" onclick="submitVolunteerRegistration()">Verify & Register Volunteer</button>
    </div>
    
    <div class="mt-4 text-center text-secondary" style="font-size: 0.85rem;">
      Already verified? <a href="login.html" style="text-decoration: underline; color: var(--primary-blue);">Login here</a>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    function switchTab(role) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      if (role === 'ngo') {
        document.querySelectorAll('.tab')[0].classList.add('active');
        document.getElementById('ngo-form').classList.add('active');
      } else {
        document.querySelectorAll('.tab')[1].classList.add('active');
        document.getElementById('volunteer-form').classList.add('active');
      }
    }

    function submitNGORegistration() {
      const name = document.getElementById('ngo-name').value;
      const reg = document.getElementById('ngo-reg').value;
      const email = document.getElementById('ngo-email').value;

      if(!name || !reg || !email) {
        alert("Please fill all fields."); return;
      }

      registerNGO({ name, reg, email });
      window.location.href = 'ngo-dashboard.html';
    }

    function submitVolunteerRegistration() {
      const name = document.getElementById('vol-name').value;
      const email = document.getElementById('vol-email').value;
      const skillsInput = document.getElementById('vol-skills').value;

      if(!name || !email || !skillsInput) {
        alert("Please fill all fields."); return;
      }

      const skills = skillsInput.split(',').map(s => s.trim()).filter(s => s);
      registerVolunteer({ name, email, skills });
      window.location.href = 'volunteer-dashboard.html';
    }
  </script>
</body>
</html>
