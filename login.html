<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SevaLink AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, rgba(66, 133, 244, 0.05) 0%, rgba(52, 168, 83, 0.05) 100%);">

  <div class="card animate-slide-up" style="max-width: 400px; width: 100%; text-align: center; padding: 3rem 2rem;">
    <div style="margin-bottom: 2rem;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--primary-blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin: 0 auto 1rem;">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path>
      </svg>
      <h2>Welcome to SevaLink AI</h2>
      <p class="text-secondary mt-2">Choose your role to continue</p>
    </div>

    <div class="flex flex-col gap-2">
      <button class="btn btn-primary" onclick="loginAs('ngo')" style="padding: 1rem; font-size: 1.1rem;">
        🏢 I am an NGO
      </button>
      <button class="btn btn-success" onclick="loginAs('volunteer')" style="padding: 1rem; font-size: 1.1rem;">
        🤝 I am a Volunteer
      </button>
    </div>
    
    <div class="mt-4 text-secondary" style="font-size: 0.85rem;">
      New here? <a href="register.html" style="text-decoration: underline; color: var(--primary-blue);">Register & Verify</a><br><br>
      <a href="index.html" style="text-decoration: underline;">&larr; Back to Home</a>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    function loginAs(role) {
      const user = getUser();
      user.role = role;
      saveUser(user);
      
      if (role === 'ngo') {
        window.location.href = 'ngo-dashboard.html';
      } else {
        window.location.href = 'volunteer-dashboard.html';
      }
    }
  </script>
</body>
</html>
